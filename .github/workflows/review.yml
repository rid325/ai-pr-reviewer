name: review-pull-requests

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review-pull:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies 
        run : python -m pip install requests google-genai

      - name : Print PR info 
        run: python scripts/print_pr_info.py
  
      
      - name: Fetch PR Diffs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetch_pr_diff.py